name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-images:
    name: Build and push ${{ matrix.service }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: app
            context: .
            image_suffix: fleetge
          # - service: metrics
          #   context: host-metrics-exporter
          #   image_suffix: host-dashboard-metrics-public
          - service: agent
            context: fleetge-agent
            image_suffix: fleetge-agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          version="${version#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Set image name
        id: image
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${{ matrix.image_suffix }}"
          echo "name=${image,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.tag }}
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=release-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.service }}

  github-release:
    name: Create GitHub release
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          version="${version#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Resolve image owner
        id: owner
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER}"
          echo "name=${owner,,}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Fleetge ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            Images:
            - `ghcr.io/${{ steps.owner.outputs.name }}/fleetge:${{ steps.version.outputs.version }}`
            - `ghcr.io/${{ steps.owner.outputs.name }}/fleetge-agent:${{ steps.version.outputs.version }}`
