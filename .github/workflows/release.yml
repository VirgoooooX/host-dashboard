name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release-config:
    name: Resolve release targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.config.outputs.matrix }}
      docker_images: ${{ steps.config.outputs.docker_images }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release targets
        id: config
        shell: bash
        run: |
          git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          tag_message="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)')"
          with_agent="false"
          if grep -qi '^with-agent=true$' <<< "$tag_message"; then
            with_agent="true"
          fi

          if [ "$with_agent" = "true" ]; then
            matrix='{"include":[{"service":"app","context":".","image_suffix":"fleetge"},{"service":"agent","context":"fleetge-agent","image_suffix":"fleetge-agent"}]}'
          else
            matrix='{"include":[{"service":"app","context":".","image_suffix":"fleetge"}]}'
          fi

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          version="${GITHUB_REF_NAME#v}"
          {
            echo "docker_images<<EOF"
            echo "- \`ghcr.io/${owner}/fleetge:${version}\`"
            if [ "$with_agent" = "true" ]; then
              echo "- \`ghcr.io/${owner}/fleetge-agent:${version}\`"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  build-images:
    name: Build and push ${{ matrix.service }} image
    needs: release-config
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.release-config.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          version="${version#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Set image name
        id: image
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${{ matrix.image_suffix }}"
          echo "name=${image,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.tag }}
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=release-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.service }}

  github-release:
    name: Create GitHub release
    needs: [release-config, build-images]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          version="${version#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Resolve image owner
        id: owner
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER}"
          echo "name=${owner,,}" >> "$GITHUB_OUTPUT"

      - name: Generate Changelog
        id: changelog
        shell: bash
        run: |
          git fetch --tags --force
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")
          
          echo "### Changelog" > changelog.md
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s (%h)" --no-merges >> changelog.md
          else
            git log "${PREV_TAG}..${CURRENT_TAG}" --pretty=format:"- %s (%h)" --no-merges >> changelog.md
          fi
          echo "" >> changelog.md
          
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          cat changelog.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Fleetge ${{ steps.version.outputs.tag }}
          generate_release_notes: false
          body: |
            ${{ env.CHANGELOG }}

            ### Docker Images
            ${{ needs.release-config.outputs.docker_images }}
