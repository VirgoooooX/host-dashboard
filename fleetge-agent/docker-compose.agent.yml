services:
  agent:
    image: ghcr.io/virgoooox/fleetge-agent:latest
    container_name: fleetge-agent
    restart: unless-stopped
    ports:
      - "${AGENT_PORT:-8080}:8080"
    environment:
      - AGENT_TOKEN=${AGENT_TOKEN:?err}
      - STACKS_BASE_DIR=/opt/stacks
      - DISK_PATHS=${DISK_PATHS:-/}
      - COLLECT_INTERVAL=${COLLECT_INTERVAL:-5}
      - AGENT_LOG_LEVEL=${AGENT_LOG_LEVEL:-info}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_STACKS_DIR:?err}:/opt/stacks
