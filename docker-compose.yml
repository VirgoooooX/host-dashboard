# Fleetge
# Multi-host Docker fleet management console.
#
# 部署前修改下方 environment 中标注"必填"的三个 Secret。
#
# Usage:
#   cp hosts.yaml.example data/hosts.yaml   # 编辑你的 Host 配置
#   docker compose up -d

services:
  fleetge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleetge
    restart: unless-stopped
    environment:
      # ═══════════════════════════════════════════════════════════
      # 必填 — 部署前修改
      # ═══════════════════════════════════════════════════════════
      # JWT 签名密钥: python -c "import secrets; print(secrets.token_hex(32))"
      JWT_SECRET: 69a74d6598edc99803d0fc648d68c383acb94c9c1e68d3e2f9e2def6ae54b58a
      # 凭证加密密钥: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      CREDENTIALS_KEY: zijhcV4hiZFML8CgiQGo7VjuFPutHcrch5QhYLCqX7s=
      # 管理员密码 (明文)
      ADMIN_PASSWORD: admin

      # ═══════════════════════════════════════════════════════════
      # 路径配置（通常不需修改）
      # ═══════════════════════════════════════════════════════════
      DATABASE_URL: sqlite:////app/data/dashboard-local.db
      HOST_CONFIG_PATH: /app/data/hosts.yaml

      # ═══════════════════════════════════════════════════════════
      # 轮询间隔（秒），有默认值，可按需调整
      # ═══════════════════════════════════════════════════════════
      # SSE 指标推送到前端的间隔，默认 1 秒
      METRICS_STREAM_INTERVAL: 1
      # 有前端连接时 Docker 容器/Stack 结构刷新间隔，默认 10 秒
      DOCKER_POLL_INTERVAL: 10
      # 无前端连接时的空闲结构刷新间隔，默认 3600 秒（1 小时）
      BACKGROUND_STRUCTURE_REFRESH_INTERVAL: 3600
      # 镜像更新检查结果缓存时间，默认 43200 秒（12 小时）
      UPDATE_CHECK_INTERVAL: 43200

      # ═══════════════════════════════════════════════════════════
      # 其他可选参数
      # ═══════════════════════════════════════════════════════════
      # 日志级别: debug / info / warning / error，默认 info
      LOG_LEVEL: info

    volumes:
      - ./data:/app/data
    ports:
      - "80:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
