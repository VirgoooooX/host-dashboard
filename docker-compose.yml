# Fleetge
# Multi-host Docker fleet management console.
#
# Secrets are injected via shell environment or a .env file in the
# project directory (docker compose reads .env automatically).
#
# Usage:
#   cp hosts.yaml.example data/hosts.yaml   # edit with your host configs
#   export JWT_SECRET=... CREDENTIALS_KEY=... ADMIN_PASSWORD_HASH=...
#   docker compose up -d

services:
  fleetge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleetge
    restart: unless-stopped
    environment:
      # ── Secrets (set via shell env or .env at deploy time) ────────
      JWT_SECRET: ${JWT_SECRET}
      CREDENTIALS_KEY: ${CREDENTIALS_KEY}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      # ── Runtime config ────────────────────────────────────────────
      DATABASE_URL: sqlite:////app/data/dashboard-local.db
      HOST_CONFIG_PATH: /app/data/hosts.yaml
    volumes:
      - ./data:/app/data
    ports:
      # The user-facing port — put this behind Lucky / nginx with HTTPS if needed.
      - "80:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
